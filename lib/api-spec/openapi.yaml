openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DesignForge Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: templates
    description: Design template operations
  - name: requests
    description: Design request submission
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List design templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a single template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found

  /submit-request:
    post:
      operationId: submitDesignRequest
      tags: [requests]
      summary: Submit a design customization request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesignRequestBody"
      responses:
        "200":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesignRequestResponse"
        "400":
          description: Validation error
        "429":
          description: Rate limit exceeded

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CustomizableField:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, color, font]
        defaultValue:
          type: string
        maxLength:
          type: integer
        options:
          type: array
          items:
            type: string
      required:
        - key
        - label
        - type
        - defaultValue

    Template:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        thumbnail:
          type: string
        modelUrl:
          type: string
        deliveryTime:
          type: string
        price:
          type: string
        specifications:
          type: array
          items:
            type: string
        customizableFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomizableField"
        availableFonts:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - description
        - category
        - deliveryTime
        - price
        - specifications
        - customizableFields
        - availableFonts

    TemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/Template"
        total:
          type: integer
        categories:
          type: array
          items:
            type: string
      required:
        - templates
        - total
        - categories

    CustomizationsMap:
      type: object
      properties:
        texts:
          type: object
          additionalProperties:
            type: string
        colors:
          type: object
          additionalProperties:
            type: string
        fonts:
          type: object
          additionalProperties:
            type: string
      required:
        - texts
        - colors
        - fonts

    DesignRequestBody:
      type: object
      properties:
        templateId:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        customizations:
          $ref: "#/components/schemas/CustomizationsMap"
      required:
        - templateId
        - customerName
        - customerEmail
        - customizations

    DesignRequestResponse:
      type: object
      properties:
        requestId:
          type: string
        message:
          type: string
        estimatedDelivery:
          type: string
      required:
        - requestId
        - message
        - estimatedDelivery
