openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: DesignForge Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: templates
    description: Design template operations
  - name: requests
    description: Design request submission
  - name: orders
    description: Order management
  - name: payments
    description: Payment processing
  - name: user
    description: User profile
  - name: fonts
    description: Font library
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List design templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 24
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get a single template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "404":
          description: Template not found

  /submit-request:
    post:
      operationId: submitDesignRequest
      tags: [requests]
      summary: Submit a design customization request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DesignRequestBody"
      responses:
        "200":
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DesignRequestResponse"
        "400":
          description: Validation error
        "429":
          description: Rate limit exceeded

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for authenticated user
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
        "401":
          description: Unauthorized

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a specific order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found

  /orders/track/{id}:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track order by ID (public, no auth needed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderTrackingResponse"
        "404":
          description: Order not found

  /payments/create-intent:
    post:
      operationId: createPaymentIntent
      tags: [payments]
      summary: Create a Stripe payment intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentIntentBody"
      responses:
        "200":
          description: Payment intent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Validation error

  /payments/verify:
    post:
      operationId: verifyPayment
      tags: [payments]
      summary: Verify payment and update order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerifyBody"
      responses:
        "200":
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentVerifyResponse"

  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    put:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /fonts:
    get:
      operationId: listFonts
      tags: [fonts]
      summary: List available fonts
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Font list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FontListResponse"

  /colors:
    get:
      operationId: listColors
      tags: [fonts]
      summary: List color palettes
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Color palette list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ColorListResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    CustomizableField:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, color, font]
        defaultValue:
          type: string
        maxLength:
          type: integer
        options:
          type: array
          items:
            type: string
      required: [key, label, type, defaultValue]

    Template:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        thumbnail:
          type: string
        deliveryTime:
          type: string
        price:
          type: string
        priceAmount:
          type: number
        specifications:
          type: array
          items:
            type: string
        customizableFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomizableField"
        availableFonts:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        complexity:
          type: string
          enum: [simple, moderate, complex]
      required: [id, title, description, category, deliveryTime, price, priceAmount, specifications, customizableFields, availableFonts]

    TemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/Template"
        total:
          type: integer
        categories:
          type: array
          items:
            type: string
      required: [templates, total, categories]

    CustomizationsMap:
      type: object
      properties:
        texts:
          type: object
          additionalProperties:
            type: string
        colors:
          type: object
          additionalProperties:
            type: string
        fonts:
          type: object
          additionalProperties:
            type: string
      required: [texts, colors, fonts]

    DesignRequestBody:
      type: object
      properties:
        templateId:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        countryCode:
          type: string
        customizations:
          $ref: "#/components/schemas/CustomizationsMap"
      required: [templateId, customerName, customerEmail, customizations]

    DesignRequestResponse:
      type: object
      properties:
        requestId:
          type: string
        message:
          type: string
        estimatedDelivery:
          type: string
        paymentRequired:
          type: boolean
        amount:
          type: number
        currency:
          type: string
      required: [requestId, message, estimatedDelivery, paymentRequired, amount, currency]

    Order:
      type: object
      properties:
        id:
          type: string
        templateId:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          type: string
          enum: [pending, confirmed, in_progress, review, completed, cancelled]
        paymentStatus:
          type: string
          enum: [unpaid, paid, refunded]
        amount:
          type: number
        currency:
          type: string
        deliveryTime:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        customizations:
          $ref: "#/components/schemas/CustomizationsMap"
      required: [id, templateId, customerName, customerEmail, status, paymentStatus, amount, currency, createdAt, updatedAt]

    OrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
      required: [orders, total]

    OrderTrackingResponse:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
        paymentStatus:
          type: string
        customerName:
          type: string
        templateId:
          type: string
        deliveryTime:
          type: string
        createdAt:
          type: string
        timeline:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              label:
                type: string
              completed:
                type: boolean
            required: [step, label, completed]
      required: [orderId, status, paymentStatus, customerName, templateId, deliveryTime, createdAt, timeline]

    PaymentIntentBody:
      type: object
      properties:
        orderId:
          type: string
        currency:
          type: string
          default: INR
      required: [orderId]

    PaymentIntentResponse:
      type: object
      properties:
        clientSecret:
          type: string
        paymentIntentId:
          type: string
        amount:
          type: number
        currency:
          type: string
        stripePublishableKey:
          type: string
      required: [clientSecret, paymentIntentId, amount, currency, stripePublishableKey]

    PaymentVerifyBody:
      type: object
      properties:
        orderId:
          type: string
        paymentIntentId:
          type: string
      required: [orderId, paymentIntentId]

    PaymentVerifyResponse:
      type: object
      properties:
        success:
          type: boolean
        orderId:
          type: string
        status:
          type: string
      required: [success, orderId, status]

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        phone:
          type: string
        name:
          type: string
        countryCode:
          type: string
        currency:
          type: string
        createdAt:
          type: string
      required: [id]

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        countryCode:
          type: string
        currency:
          type: string

    FontItem:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        variants:
          type: array
          items:
            type: string
        previewText:
          type: string
      required: [name, category]

    FontListResponse:
      type: object
      properties:
        fonts:
          type: array
          items:
            $ref: "#/components/schemas/FontItem"
        total:
          type: integer
        categories:
          type: array
          items:
            type: string
      required: [fonts, total, categories]

    ColorPalette:
      type: object
      properties:
        name:
          type: string
        colors:
          type: array
          items:
            type: string
        category:
          type: string
      required: [name, colors, category]

    ColorListResponse:
      type: object
      properties:
        palettes:
          type: array
          items:
            $ref: "#/components/schemas/ColorPalette"
        totalColors:
          type: integer
        categories:
          type: array
          items:
            type: string
      required: [palettes, totalColors, categories]
